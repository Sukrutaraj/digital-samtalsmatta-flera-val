<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Samtalsmatta Builder</title>

<style>

body{
font-family:sans-serif;
background:#f5f5f5;
text-align:center;
padding:20px;
}

.section{
background:white;
padding:15px;
margin:12px auto;
border-radius:12px;
max-width:700px;
}

.choice{
width:180px;
height:180px;
border-radius:20px;
border:none;
margin:10px;
cursor:pointer;
font-size:60px;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

.choice img{
max-width:90px;
max-height:90px;
}

.yes{background:#4CAF50;}
.maybe{background:orange;}
.no{background:#F44336;}

.grid{
display:flex;
justify-content:center;
flex-wrap:wrap;
}

.next{
background:#2196F3;
color:white;
padding:14px 26px;
border:none;
border-radius:12px;
font-size:20px;
margin-top:20px;
}

</style>
</head>

<body>

<h2>Samtalsmatta Builder</h2>

<!-- VAL 1 -->
<div class="section">
<b>JA</b><br>
Visa emoji/text:
<input id="v1show" value="👍"><br>
Röst säger:
<input id="v1say" value="Ja"><br>
Bild:
<input type="file" onchange="loadChoiceImg(event,'v1')">
</div>

<!-- VAL 2 -->
<div class="section">
<b>VET EJ</b><br>
<input id="v2show" value="🤷"><br>
<input id="v2say" value="Vet inte"><br>
<input type="file" onchange="loadChoiceImg(event,'v2')">
</div>

<!-- VAL 3 -->
<div class="section">
<b>NEJ</b><br>
<input id="v3show" value="👎"><br>
<input id="v3say" value="Nej"><br>
<input type="file" onchange="loadChoiceImg(event,'v3')">
</div>

<div id="builder"></div>

<button onclick="addQuestion()">➕ Lägg till fråga</button>
<button onclick="generate()">Generera</button>
<button onclick="download()">⬇ Ladda ner</button>

<div id="preview"></div>

<script>

let questions=[];
let choiceImgs={};
let generatedHTML="";

/* ---------- VALBILDER ---------- */

function loadChoiceImg(e,key){
const r=new FileReader();
r.onload=()=>choiceImgs[key]=r.result;
r.readAsDataURL(e.target.files[0]);
}

/* ---------- FRÅGOR ---------- */

function addQuestion(){

const i=questions.length;
questions.push({text:"",img:""});

const div=document.createElement("div");
div.className="section";

const input=document.createElement("input");
input.placeholder="Skriv fråga";
input.style.width="90%";
input.oninput=()=>questions[i].text=input.value;

const file=document.createElement("input");
file.type="file";
file.accept="image/*";

const img=document.createElement("img");
img.style.maxWidth="200px";
img.style.display="none";

file.onchange=function(e){
const r=new FileReader();
r.onload=function(){
questions[i].img=this.result;
img.src=this.result;
img.style.display="block";
};
r.readAsDataURL(e.target.files[0]);
};

div.appendChild(input);
div.appendChild(document.createElement("br"));
div.appendChild(document.createElement("br"));
div.appendChild(file);
div.appendChild(document.createElement("br"));
div.appendChild(img);

builder.appendChild(div);
}

/* ---------- GENERERA ---------- */

function generate(){

const config={
v1:{show:v1show.value,say:v1say.value,img:choiceImgs.v1},
v2:{show:v2show.value,say:v2say.value,img:choiceImgs.v2},
v3:{show:v3show.value,say:v3say.value,img:choiceImgs.v3}
};

const data=JSON.stringify(questions);

generatedHTML=`
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{font-family:sans-serif;text-align:center;background:#f7f7f7}

.choice{
width:180px;height:180px;
border-radius:20px;
margin:10px;
font-size:60px;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

.choice img{
max-width:90px;
max-height:90px;
}

.yes{background:#4CAF50}
.maybe{background:orange}
.no{background:#F44336}

.grid{display:flex;justify-content:center}

.next{
background:#2196F3;
color:white;
padding:14px 26px;
border:none;
border-radius:12px;
font-size:20px;
margin-top:20px;
}
</style>

</head>

<body>

<h2 id="q"></h2>
<img id="img" style="max-width:300px"><br>

<div class="grid">

<button class="choice yes"
onclick="choose(config.v1.say)">
${config.v1.img?'<img src="'+config.v1.img+'">':config.v1.show}
</button>

<button class="choice maybe"
onclick="choose(config.v2.say)">
${config.v2.img?'<img src="'+config.v2.img+'">':config.v2.show}
</button>

<button class="choice no"
onclick="choose(config.v3.say)">
${config.v3.img?'<img src="'+config.v3.img+'">':config.v3.show}
</button>

</div>

<button class="next" onclick="nextQ()">Nästa</button>

<script>

const config=${JSON.stringify(config)};
const Q=${data};

let i=0;
let selected=null;
let answers=[];

/* ✅ ENKEL STABIL RÖST */

function speak(text){
speechSynthesis.cancel();
const msg=new SpeechSynthesisUtterance(text);
msg.lang="sv-SE";
speechSynthesis.speak(msg);
}

function render(){

if(i>=Q.length){
document.body.innerHTML=
"<h2>Klart</h2>"+answers.join("<br>");
return;
}

document.getElementById("q").innerText=Q[i].text;
document.getElementById("img").src=Q[i].img||"";
}

function choose(val){
selected=val;
speak(val);
}

function nextQ(){
if(!selected)return;
answers.push(selected);
i++;
render();
}

render();

<\/script>

</body>
</html>
`;

preview.innerHTML=
'<iframe style="width:100%;height:650px;border:none" srcdoc="'+
generatedHTML.replace(/"/g,'&quot;')+
'"></iframe>';
}

function download(){
const blob=new Blob([generatedHTML],{type:"text/html"});
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="samtalsmatta.html";
a.click();
}

addQuestion();

</script>

</body>
</html>
